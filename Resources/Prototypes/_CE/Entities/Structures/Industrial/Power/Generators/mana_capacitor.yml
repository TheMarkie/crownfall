- type: entity
  id: CEGeneratorMagicCapacitor
  categories: [ ForkFiltered ]
  parent:
  - CEConstructibleMachine
  - BaseMachine
  name: air capacitor
  description: Absorbs magical energy diffusing in the air, condenses it into a liquid form that can be transported through brass pipes.
  placement:
    mode: SnapgridCenter
  components:
  - type: Machine
    board: CEMachineCoreGeneratorMagicCapacitor
  - type: PlacementReplacement
    key: pipe_big
  #- type: AmbientSound
  #  volume: -7
  #  range: 3
  #  sound:
  #    path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: Sprite
    sprite: _CE/Structures/Industrial/Power/Generator/capacitor.rsi
    drawdepth: Mobs
    layers:
      - state: base
      - sprite: _CE/Effects/cast_impact48.rsi
        state: circle_decrease
        color: "#2d8ad65b"
        visible: false
        map: [ "active" ]
  - type: GenericVisualizer
    visuals:
      enum.CERadiationReceiverVisuals.Active:
        active:
          True: { visible: true }
          False: { visible: false }
  - type: CERadiationReceiverVisuals
  - type: Appearance
  - type: NodeContainer
    examinable: true
    nodes:
      input:
        !type:CableDeviceNode
        nodeGroupID: HVPower
      power:
        !type:CableNode
        nodeGroupID: HVPower
  - type: Battery
    # Very important:
    # Disable networking to prevent the battery getting continuously dirtied every tick as it interacts with the power network.
    # This can not be done by changing the charge rate as the power supply ramps up over time.
    # This disables prediction for this battery.
    netsync: false
    startingCharge: 0
    maxCharge: 100
  - type: ExaminableBattery #TODO Change to mana specific
  - type: BatteryDischarger
  - type: PowerMonitoringDevice
    group: Generator
    loadNode: input
    sprite: _CE/Structures/Industrial/Power/Generator/capacitor.rsi
    state: base
  - type: PowerNetworkBattery
    maxSupply: 20
    maxChargeRate: 10
    supplyRampTolerance: 10
    supplyRampRate: 1
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: RadiationReceiver
  - type: CEEnergyRadiationRegeneration
    energy: 1
  #- type: CEEnergyOverchargeDamage
