- type: entity
  abstract: true
  id: CEAccumulatorVesselBase
  categories: [ ForkFiltered ]
  parent: 
  - CEBaseMachineBigPipeConnectable
  - CEConstructibleMachine
  - BaseMachine
  name: accumulator vessel
  description: A structure that collects magical energy and stores it for later use.
  placement:
    mode: SnapgridCenter
  components:
  - type: Machine
    board: CEMachineCoreAccumulatorVessel
  #- type: AmbientSound
  #  volume: -7
  #  range: 3
  #  sound:
  #    path: /Audio/Ambience/Objects/periodic_beep.ogg
  - type: Sprite
    sprite: _CE/Structures/Industrial/Power/accumulator.rsi
    drawdepth: Mobs
    layers:
      - state: base
      - map: ["enum.SmesVisualLayers.Charge"]
        state: "fill-1"
        shader: unshaded
        visible: false
      - state: glass
      - state: top
      - map: ["enum.SmesVisualLayers.Input"]
        state: charging0
        shader: unshaded
      - map: ["enum.SmesVisualLayers.Output"]
        state: dicharging1
        shader: unshaded
  - type: Smes
    chargeOverlayPrefix: fill-
    inputOverlayPrefix: charging
    outputOverlayPrefix: dicharging
    numChargeLevels: 8
  - type: Appearance
  - type: Battery
    # Very important:
    # Disable networking to prevent the battery getting continuously dirtied every tick as it interacts with the power network.
    # This can not be done by changing the charge rate as the power supply ramps up over time.
    # This disables prediction for this battery.
    netsync: false
    startingCharge: 0
    maxCharge: 1000
  - type: ExaminableBattery #TODO Change to mana specific
  - type: NodeContainer
    examinable: true
    nodes:
      input:
        !type:CableDeviceNode
        nodeGroupID: HVPower
      power:
        !type:CableNode
        nodeGroupID: HVPower
      output:
        !type:CableDeviceNode
        nodeGroupID: HVPower
  - type: BatteryDischarger
    voltage: High
    node: output
  - type: BatteryCharger
    voltage: High
    node: input
  - type: PowerMonitoringDevice
    group: SMES
    sourceNode: input
    loadNode: output
    sprite: Structures/Power/power.rsi
    state: accumulator
  - type: PowerNetworkBattery
    maxSupply: 10
    maxChargeRate: 10
    supplyRampTolerance: 10
    supplyRampRate: 1
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#309fdf"
    castShadows: false
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallicStrong
  - type: StaticPrice
    price: 100

- type: entity
  parent: CEAccumulatorVesselBase
  id: CEAccumulatorVessel
  suffix: Charged
  components:
  - type: Battery
    maxCharge: 1000
    startingCharge: 1000

- type: entity
  parent: CEAccumulatorVesselBase
  id: CEAccumulatorVesselEmpty
  suffix: Empty
  components:
  - type: Battery
    maxCharge: 1000
    startingCharge: 0
