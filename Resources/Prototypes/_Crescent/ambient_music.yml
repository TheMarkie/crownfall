#example
- type: ambientMusic
  id: test
  sound:
    collection: test

- type: soundCollection
  id: test
  files:
   - /Audio/_Crescent/parietal_lobe.ogg

#ambient fallback, don't remove, but can change song

- type: ambientMusic
  id: default
  priority: 1
  sound:
    collection: default

- type: soundCollection
  id: default
  files:
   - /Audio/_Crescent/parietal_lobe.ogg