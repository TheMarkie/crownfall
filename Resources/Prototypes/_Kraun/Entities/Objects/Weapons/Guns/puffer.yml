- type: entity
  id: KraunGunPuffer
  parent:
  - BaseWeaponBattery
  name: 300mP 'Puffer' repeating pistol
  description: A fast-firing repeating pistol ubiquitously manufacted by both sides of the conflict, reliable and easy to maintain.
  categories: [ ForkFiltered ]
  components:
  - type: Item
    size: Large
    shape:
    - 0, 0, 2, 1 # 2x3
  - type: Appearance
  - type: Sprite
    sprite: _Kraun/Objects/Weapons/Guns/puffer.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-3
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: _CE/Objects/Tools/Weapons/Guns/justice.rsi
    equipDelay: 0.5
    unequipDelay: 0.5
    equipWhileMoving: true
    slots:
    - belt
  - type: MagazineVisuals
    magState: mag
    steps: 4
  - type: BatteryAmmoProvider
    proto: CEJusticeHitscan
    fireCost: 5
  - type: Battery
    maxCharge: 40
    startingCharge: 40
  - type: Gun
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    angleIncrease: 5
    angleDecay: 20
    minAngle: 0
    maxAngle: 50
    cameraRecoilScalar: 0.2
    fireRate: 2.5
    resetOnHandSelected: false
    soundGunshot:
      path: /Audio/_CE/Effects/peacekeeper_laser.ogg
      params:
        variation: 0.2
  - type: StaticPrice
    price: 150