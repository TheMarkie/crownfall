- type: entity
  parent: BaseStructure
  id: Trench
  name: trench
  suffix: Straight
  description: The wall of a manmade hole.
  categories: [ ForkFiltered ]
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: _Kraun/Structures/Obstacles/cliff_dirt.rsi
    state: cliff
  - type: Icon
    sprite: _Kraun/Structures/Obstacles/cliff_dirt.rsi
    state: cliff
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "0.49,0.49,-0.49,0.25"
        density: 1000
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Climbable

