# Entities that are entirely magical and can be destroyed by dispelling magic.
- type: entity
  id: CESpectralBase
  categories: [ ForkFiltered ]
  abstract: true
  components:
  - type: CEMagicEnergyContainer
    magicAlert: CEMagicEnergy
    maxEnergy: 1
    energy: 1
    unsafeSupport: true
  - type: Damageable
    damageContainer: CESpectral
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 10
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/eye_close.ogg
          params:
            volume: 6
      - !type:DoActsBehavior
        acts: [ "Destruction" ]


- type: damageContainer
  id: CESpectral
  supportedGroups:
  - CEMagic