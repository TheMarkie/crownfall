- type: biomeTemplate
  id: TrenchFill
  layers:
    - !type:BiomeTileLayer
      threshold: -1.0
      tile: CEStone
    - !type:BiomeTileLayer
      tile: CEDirt
      threshold: 0
      noise:
        seed: 0
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.05
        octaves: 3
        lacunarity: 1.8
        gain: 0.7
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120

- type: biomeTemplate
  id: Trenchland
  layers:
    - !type:BiomeMetaLayer
      template: TrenchFill
    - !type:BiomeDecalLayer #Rock decal
      allowedTiles:
      - CEStone
      - CEDirt
      threshold: 0.6
      divisions: 1
      noise:
        seed: 18
        noiseType: OpenSimplex2
        fractalType: Ridged
        frequency: 0.11
        octaves: 3
        lacunarity: 1.7
        gain: 0.8
        domainWarpType: OpenSimplex2
        domainWarpAmp: 120
      decals:
        - CEFloraRock01
        - CEFloraRock02
        - CEFloraRock03
        - CEFloraRock04
        - CEFloraRock05
    - !type:BiomeEntityLayer # Rare Trees
      threshold: 0.8
      noise:
        seed: 0
        noiseType: OpenSimplex2
        fractalType: FBm
        frequency: 3
      allowedTiles:
        - CEDirt
        - CEStone
      entities:
        - CEFloraTreeDead
        - CEFloraTreeDeadSmall
    - !type:BiomeEntityLayer # More Rocks
      threshold: 0.7
      noise:
        seed: 18
        noiseType: OpenSimplex2
        fractalType: FBm
        frequency: 3
      allowedTiles:
        - CEFloorBase
      entities:
        - CERockSmall
        - CEBaseBoneRemains
    - !type:BiomeEntityLayer # More Rocks
      threshold: 0.8
      noise:
        seed: 27
        noiseType: OpenSimplex2
        fractalType: FBm
        frequency: 2
      allowedTiles:
        - CEStone
      entities:
        - CERockBig
        - CERockBigMoss
    - !type:BiomeEntityLayer # Walls
      allowedTiles:
        - CEDirt
      threshold: 0.5
      noise:
        seed: 12
        noiseType: OpenSimplex2
        frequency: 0.03
        lacunarity: 2
        fractalType: Ridged
        octaves: 1
        cellularDistanceFunction: Euclidean
        cellularReturnType: Distance
        cellularJitterModifier: 0.7
        domainWarpType: OpenSimplex2Reduced
        domainWarpAmp: 285
      entities:
        - CEWallDirt


